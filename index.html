// Email form field/message validation English replacements
function contactFormError(code) {
  switch(code) {
    case 'name': return '⚠️ Please provide your name';
    case 'email': return '⚠️ Please enter a valid Email';
    case 'message': return '⚠️ Please provide a message (at least 5 characters)';
    case 'setup': return '⚠️ EmailJS is not set up, please fill out Service ID, Template ID, and Public Key.';
    case 'ratelimit': return '⚠️ Too many requests. Please try again later.';
    case 'cooldown': return '⏳ Please wait a few seconds before sending again.';
    case 'sendfail': return '❌ Send failed.';
    case 'sendsuccess': return '✅ Message sent! I will reply soon.';
    case 'ejsload': return '❌ Failed to load EmailJS. Check your Internet connection.';
    default: return 'Error.';
  }
}
